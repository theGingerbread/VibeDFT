id: qe.scf_dos.v2
software: qe
description: QE SCF → NSCF(DOS) → DOS → PDOS workflow with per-stage templates.
stages:
  - id: scf
    program: pw.x
    template: templates/scf_dos/scf.in.j2
    description: Self-consistent field calculation (charge density).
  - id: nscf_dos
    program: pw.x
    depends_on: [scf]
    description: Non-SCF calculation on dense k-mesh for DOS.
    template: templates/scf_dos/nscf.in.j2
  - id: dos
    program: dos.x
    depends_on: [nscf_dos]
    description: Density of states post-processing.
    template: templates/scf_dos/dos.in.j2
  - id: projwfc
    program: projwfc.x
    depends_on: [nscf_dos]
    optional: true
    description: Projected density of states (orbital/atom-resolved).
    template: templates/scf_dos/projwfc.in.j2
templates:
  - templates/scf_dos/scf.in.j2
  - templates/scf_dos/nscf.in.j2
  - templates/scf_dos/dos.in.j2
  - templates/scf_dos/projwfc.in.j2
uses:
  - qe.pw.control.prefix
  - qe.pw.control.calculation
  - qe.pw.control.outdir
  - qe.pw.control.pseudo_dir
  - qe.pw.control.tprnfor
  - qe.pw.control.tstress
  - qe.pw.control.verbosity
  - qe.pw.control.etot_conv_thr
  - qe.pw.system.ibrav
  - qe.pw.system.nat
  - qe.pw.system.ntyp
  - qe.pw.system.ecutwfc
  - qe.pw.system.ecutrho
  - qe.pw.system.occupations
  - qe.pw.system.smearing
  - qe.pw.system.degauss
  - qe.pw.system.tot_charge
  - qe.pw.electrons.conv_thr
  - qe.pw.electrons.electron_maxstep
  - qe.pw.electrons.mixing_beta
  - qe.dos.DeltaE
  - qe.dos.ngauss
  - qe.dos.degauss
  - qe.projwfc.DeltaE
  - qe.projwfc.ngauss
  - qe.projwfc.degauss
  - common.kpoints.grid
parameters:
  qe.pw.system.ecutwfc: 60
  qe.pw.system.ecutrho: 480
  common.kpoints.grid: [12, 12, 1]
