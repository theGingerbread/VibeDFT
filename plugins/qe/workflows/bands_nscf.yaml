id: qe.bands_nscf.v1
software: qe
description: |
  QE bands calculation on high-symmetry k-path (nscf mode).
  Reads charge density from SCF outdir. Depends on: qe.scf.v1.
  Outputs: bands_nscf.out + out_bands/ save for bands.x post-processing.
stages:
  - id: bands_nscf
    program: pw.x
    template: templates/bands/bands.in.j2
    description: Non-SCF on high-symmetry k-path for band structure.
templates:
  - templates/bands/bands.in.j2
uses:
  - qe.pw.control.prefix
  - qe.pw.control.calculation
  - qe.pw.control.outdir
  - qe.pw.control.pseudo_dir
  - qe.pw.control.verbosity
  - qe.pw.system.ibrav
  - qe.pw.system.nat
  - qe.pw.system.ntyp
  - qe.pw.system.ecutwfc
  - qe.pw.system.ecutrho
  - qe.pw.system.occupations
  - qe.pw.system.smearing
  - qe.pw.system.degauss
  - qe.pw.system.tot_charge
  - qe.pw.electrons.conv_thr
  - qe.pw.electrons.mixing_beta
parameters:
  qe.pw.control.calculation: nscf
  qe.bands.source_outdir: ../02_scf/out_scf/
