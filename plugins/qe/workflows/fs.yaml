id: qe.fs.v1
software: qe
description: "QE Fermi surface workflow: dense scf/nscf → fs.x → .bxsf for XCrySDen visualization."
stages:
  - id: scf_nscf
    program: pw.x
    description: SCF/NSCF on dense uniform k-mesh with smearing (required for metallic systems).
    template: templates/fs/fs.in.j2
  - id: fs
    program: fs.x
    depends_on: [scf_nscf]
    description: Fermi surface post-processing → .bxsf file.
    template: templates/fs/fs.in.j2
templates:
  - templates/fs/fs.in.j2
uses:
  - qe.pw.control.prefix
  - qe.pw.control.calculation
  - qe.pw.control.outdir
  - qe.pw.control.pseudo_dir
  - qe.pw.control.verbosity
  - qe.pw.system.ibrav
  - qe.pw.system.nat
  - qe.pw.system.ntyp
  - qe.pw.system.ecutwfc
  - qe.pw.system.ecutrho
  - qe.pw.system.occupations
  - qe.pw.system.smearing
  - qe.pw.system.degauss
  - qe.pw.electrons.conv_thr
  - qe.pw.electrons.mixing_beta
  - qe.fs.prefix
  - qe.fs.outdir
  - qe.fs.deltaE
  - common.kpoints.grid
parameters:
  common.kpoints.grid: [24, 24, 1]
