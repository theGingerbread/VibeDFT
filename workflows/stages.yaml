  _readme: '# 17_aimd — Ab Initio Molecular Dynamics


    **Stage Type**: `thermal`


    ---


    ## 1. Physics Question


    Is the 2D structure thermally stable at finite temperature — does it maintain
    its geometry or reconstruct?


    ## 2. Upstream Dependencies


    05_final_relax


    ## 3. Downstream Dependencies


    None (terminal stage)


    ## 4. Required QE Programs


    pw.x


    ## 5. Expected Outputs


    - `aimd_trajectory.xyz`

    - `aimd_summary.yaml`


    ## 6. Success Criteria


    - [x] Structure preserved throughout simulation (no bond breaking beyond thermal
    fluctuations)

    - [x] Temperature equilibrated around target within acceptable fluctuations

    - [x] Energy drift < acceptable threshold over simulation time

    - [x] No unphysical atomic displacements or diffusion events


    ## 7. Failure Criteria


    - [ ] Structure disintegrates or reconstructs at target temperature

    - [ ] Temperature never equilibrates (runaway heating or cooling)

    - [ ] Large energy drift indicates poor SCF convergence per MD step

    - [ ] Atoms diffuse out of the layer into vacuum


    ## Description


    Born-Oppenheimer MD at target temperature(s) to assess thermal stability.


    Computationally expensive — run only AFTER geometry is finalized.


    For 2D materials: monitor if atoms remain in-plane or diffuse into vacuum.


    Typical: NVT ensemble, 5-10 ps, time step 1-2 fs.



    ## 2D Materials Considerations


    2D: monitor out-of-plane atomic displacements (z-coordinate variance). Check that
    the 2D layer does not buckle or reconstruct at finite T. Vacuum layer must be
    large enough to accommodate thermal vibrations without interaction between periodic
    images.

    ## Validation Targets


    - `structure_preserved`

    - `temperature_equilibration`

    - `energy_drift`

    - `no_diffusion_to_vacuum`

    '
