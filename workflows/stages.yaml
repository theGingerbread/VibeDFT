  _readme: '# 18_exfoliation — Exfoliation / Cleavage Energy


    **Stage Type**: `mechanical`


    ---


    ## 1. Physics Question


    What is the energy required to exfoliate a monolayer from the bulk — is mechanical
    exfoliation feasible?


    ## 2. Upstream Dependencies


    05_final_relax


    ## 3. Downstream Dependencies


    None (terminal stage)


    ## 4. Required QE Programs


    pw.x


    ## 5. Expected Outputs


    - `exfoliation_energy.yaml`

    - `cleavage_energy_vs_separation.dat`


    ## 6. Success Criteria


    - [x] Exfoliation energy converges to a plateau as interlayer separation increases

    - [x] Energy value physically reasonable for vdW materials (< 1 N/m for exfoliable
    2D)

    - [x] van der Waals correction applied (DFT-D3, vdW-DF, or similar)


    ## 7. Failure Criteria


    - [ ] No energy plateau — exfoliation energy does not converge with separation

    - [ ] Exfoliation energy > 2 N/m (likely not exfoliable by mechanical methods)

    - [ ] Missing vdW correction (bare DFT cannot describe interlayer binding)


    ## Description


    Calculate energy vs interlayer separation curve.


    Requires bulk reference or bilayer calculation.


    Key descriptor for 2D material synthesizability.


    vdW correction MANDATORY — bare GGA cannot describe interlayer binding.



    ## 2D Materials Considerations


    2D: exfoliation energy in meV/A^2 or N/m. Typical exfoliable 2D: < 0.3-0.5 N/m
    (graphene ~0.3 N/m). Compare with known exfoliated materials. Method: fixed in-plane
    lattice, vary interlayer distance, fit to universal binding curve.

    ## Validation Targets


    - `energy_plateau`

    - `exfoliation_feasibility`

    - `vdw_correction_applied`

    '
