stages:
- stage_name: Structure Definition
  stage_id: 00_structure
  stage_type: preparation
  physics_question: What is the crystallographic geometry of the 2D material, and
    is the vacuum layer sufficient?
  description: 'Accept raw structure (CIF, XYZ, POSCAR) and produce a QE-compatible
    input geometry with explicit vacuum layer for 2D materials. No electronic calculation
    is performed at this stage.

    '
  upstream_dependencies: []
  downstream_stages:
  - 01_pseudopotentials
  required_qe_executables: []
  optional_qe_executables: []
  expected_inputs:
  - name: structure.cif
    description: Input crystal structure (CIF, XYZ, or POSCAR)
    required: true
  - name: vacuum_config.yaml
    description: Vacuum layer configuration (thickness, direction)
    required: false
  expected_outputs:
  - name: structure.qe.in
    description: QE-compatible ATOMIC_POSITIONS + CELL_PARAMETERS block
    required: true
  - name: structure_summary.yaml
    description: Lattice parameters, atomic positions, vacuum thickness
    required: true
  validation_rules:
  - name: lattice_consistency
    description: Check lattice parameters are physically reasonable for claimed phase
  - name: vacuum_thickness
    description: Verify vacuum layer ≥ 20 Å in the non-periodic direction
  - name: stoichiometry_check
    description: Verify atom counts match expected stoichiometry
  metadata:
    estimated_runtime: < 1 second
    parallelization: N/A
    produces_charge_density: false
- stage_name: Pseudopotential Selection
  stage_id: 01_pseudopotentials
  stage_type: preparation
  physics_question: Are the selected pseudopotentials appropriate for the target material
    and properties?
  description: 'Select and validate pseudopotentials for each element in the structure.
    For 2D materials with heavy elements (e.g., Hf, transition metals), verify that
    semi-core states are included when needed for phonon/EPC accuracy.

    '
  upstream_dependencies:
  - 00_structure
  downstream_stages:
  - 02_preconv
  required_qe_executables: []
  optional_qe_executables: []
  expected_inputs:
  - name: element_list.yaml
    description: List of elements from 00_structure
    required: true
  - name: pseudopotential_library_path
    description: Path to pseudopotential library (PSlibrary, SSSP, etc.)
    required: true
  expected_outputs:
  - name: pseudopotential_manifest.yaml
    description: Selected pseudopotentials per element with rationale
    required: true
  - name: pseudo_warnings.yaml
    description: 'Warnings: missing semi-core, known soft pseudo issues'
    required: false
  validation_rules:
  - name: semi_core_check
    description: Verify semi-core states are included for phonon-sensitive elements
  - name: library_consistency
    description: Ensure all pseudopotentials come from the same library/reference
  - name: valence_configuration
    description: Check valence electron count against expected chemistry
  metadata:
    estimated_runtime: < 1 second
    parallelization: N/A
    produces_charge_density: false
- stage_name: Pre-Convergence Testing
  stage_id: 02_preconv
  stage_type: convergence
  physics_question: What are the coarse bounds for ecutwfc and k-mesh before full
    convergence testing?
  description: 'Run coarse parameter sweeps to establish safe starting values for
    the full convergence study. Uses low k-mesh and default mixing to quickly bound
    ecutwfc and ecutrho. Outputs are NOT used for production — only to inform the
    convergence matrix in 04_conv.

    '
  upstream_dependencies:
  - 01_pseudopotentials
  downstream_stages:
  - 03_relax
  required_qe_executables:
  - pw.x
  expected_inputs:
  - name: preconv_config.yaml
    description: Coarse sweep ranges for ecutwfc, ecutrho
    required: true
  expected_outputs:
  - name: preconv_summary.yaml
    description: Recommended starting ecutwfc, ecutrho for convergence testing
    required: true
  - name: preconv_raw.csv
    description: Raw energy-vs-ecut data points
    required: false
  validation_rules:
  - name: ecut_bounds_check
    description: Verify ecutwfc range covers plateau onset
  - name: pseudopotential_compatibility
    description: Check ecutrho/ecutwfc ratio matches pseudopotential type (USPP ≥
      8, NC ≥ 4)
  metadata:
    estimated_runtime: ~5–15 min on 28 cores
    parallelization: MPI over k-points
    produces_charge_density: false
- stage_name: Initial Relaxation
  stage_id: 03_relax
  stage_type: relaxation
  physics_question: What is the relaxed geometry at a coarse but reasonable parameter
    set?
  description: 'Perform initial vc-relax with coarse parameters to obtain a reasonable
    starting geometry for the full convergence study. The relaxed structure from this
    stage feeds into 04_conv for parameter convergence testing, NOT into production
    calculations.

    Critical for 2D materials: must use cell_dofree=''2Dxy'' to keep vacuum layer
    fixed during relaxation.

    '
  upstream_dependencies:
  - 02_preconv
  downstream_stages:
  - 04_conv
  required_qe_executables:
  - pw.x
  expected_inputs:
  - name: relax_coarse.in
    description: vc-relax input with coarse ecut/k-mesh from 02_preconv
    required: true
  expected_outputs:
  - name: relax_coarse.out
    description: QE output with final energy, forces, stress
    required: true
  - name: relaxed_structure.in
    description: Extracted CELL_PARAMETERS + ATOMIC_POSITIONS from relaxation
    required: true
  validation_rules:
  - name: bfgs_convergence
    description: Verify BFGS converged within max steps
  - name: force_threshold
    description: Final forces < forc_conv_thr
  - name: cell_dofree_2d
    description: For 2D materials, verify cell_dofree='2Dxy' was used
  - name: vacuum_preserved
    description: Verify c-axis (vacuum) did not collapse during relaxation
  metadata:
    estimated_runtime: ~30 min–2 hr on 28 cores
    parallelization: MPI over k-points
    produces_charge_density: false
- stage_name: Full Convergence Testing
  stage_id: 04_conv
  stage_type: convergence
  physics_question: What parameter set yields total energy converged to < 1 mRy/atom?
  description: 'Systematic convergence testing across multiple dimensions: ecutwfc,
    k-mesh, vacuum thickness, and smearing width. Uses the relaxed structure from
    03_relax as the fixed geometry.

    Output is a converged parameter set that feeds into 05_final_relax and all subsequent
    production calculations.

    This stage answers ONLY the convergence question — it does NOT produce production-quality
    results.

    '
  upstream_dependencies:
  - 03_relax
  downstream_stages:
  - 05_final_relax
  required_qe_executables:
  - pw.x
  expected_inputs:
  - name: convergence_matrix.yaml
    description: Parameter sweep definitions (ecut list, k-mesh list, vacuum list,
      smearing list)
    required: true
  expected_outputs:
  - name: convergence_report.yaml
    description: Converged parameters with convergence curves and thresholds
    required: true
  - name: convergence_plots/
    description: Energy vs ecut, energy vs k-mesh, energy vs vacuum plots
    required: false
  validation_rules:
  - name: ecut_convergence
    description: ΔE < 1 mRy/atom between successive ecut values
  - name: kmesh_convergence
    description: ΔE < 1 mRy/atom between successive k-mesh densities
  - name: vacuum_convergence
    description: ΔE < 1 mRy/atom between successive vacuum thicknesses
  - name: smearing_convergence
    description: Total energy stable across smearing range for metals
  metadata:
    estimated_runtime: ~2–8 hr on 28 cores (parallel sweeps)
    parallelization: MPI over k-points; sweeps can be embarrassingly parallel
    produces_charge_density: false
- stage_name: Final Relaxation
  stage_id: 05_final_relax
  stage_type: relaxation
  physics_question: What is the fully converged equilibrium geometry of the 2D material?
  description: 'Perform final vc-relax using the CONVERGED parameters from 04_conv.
    This produces the production-quality relaxed geometry used by all downstream electronic,
    phonon, and property calculations.

    PH_STABILITY and EPC stages MUST use this geometry as input. This stage must NOT
    be skipped or replaced by 03_relax results.

    '
  upstream_dependencies:
  - 04_conv
  downstream_stages:
  - 06_scf
  - 16_elastic
  - 17_aimd
  - 18_exfoliation
  required_qe_executables:
  - pw.x
  expected_inputs:
  - name: relax_final.in
    description: vc-relax input with converged ecut/k-mesh from 04_conv
    required: true
  expected_outputs:
  - name: relax_final.out
    description: Full QE vc-relax output
    required: true
  - name: final_structure.in
    description: Extracted CELL_PARAMETERS + ATOMIC_POSITIONS — THE canonical geometry
    required: true
  - name: final_structure.cif
    description: CIF export for interoperability
    required: false
  validation_rules:
  - name: bfgs_convergence
    description: BFGS converged in < 100 steps
  - name: force_convergence
    description: Final forces < 1e-4 Ry/Bohr
  - name: stress_convergence
    description: Final stress < 0.5 kbar for 2D materials
  - name: cell_dofree_2d
    description: Verify cell_dofree='2Dxy' preserved for 2D materials
  - name: vacuum_unchanged
    description: c-axis unchanged to within 0.1 Å
  metadata:
    estimated_runtime: ~1–4 hr on 28 cores
    parallelization: MPI over k-points
    produces_charge_density: false
- stage_name: Self-Consistent Field
  stage_id: 06_scf
  stage_type: electronic_structure
  physics_question: What is the self-consistent charge density and ground-state electronic
    energy?
  description: 'Perform a high-precision SCF calculation using the converged geometry
    from 05_final_relax and converged parameters from 04_conv.

    This stage produces the charge density that ALL downstream electronic and vibrational
    calculations depend on. It is the single most critical chokepoint in the workflow
    — any error here propagates everywhere.

    Must use tight convergence: conv_thr ≥ 1e-10 for phonon/EPC chains.

    '
  upstream_dependencies:
  - 05_final_relax
  downstream_stages:
  - 07_bands
  - 08_dos
  - 12_ph_stability
  - 19_optical
  required_qe_executables:
  - pw.x
  expected_inputs:
  - name: scf.in
    description: SCF input with final structure + converged parameters
    required: true
  expected_outputs:
  - name: scf.out
    description: Full QE SCF output
    required: true
  - name: charge_density/
    description: QE outdir with saved charge density (required by NSCF, PH, bands)
    required: true
  - name: scf_summary.yaml
    description: Total energy, Fermi energy, convergence metrics
    required: true
  validation_rules:
  - name: scf_convergence
    description: SCF converged within electron_maxstep
  - name: total_energy_consistency
    description: 'Compare with 04_conv last SCF: ΔE < 0.1 mRy'
  - name: band_gap_sanity
    description: Rough band gap consistent with material type (metal vs semiconductor)
  metadata:
    estimated_runtime: ~15–45 min on 28 cores
    parallelization: MPI over k-points
    produces_charge_density: true
- stage_name: Band Structure
  stage_id: 07_bands
  stage_type: electronic_structure
  physics_question: What is the electronic band structure along high-symmetry k-paths?
  description: 'Calculate the electronic band structure along standardized high-symmetry
    paths for 2D hexagonal/rectangular lattices.

    Uses the SCF charge density from 06_scf — does NOT perform a new SCF. This is
    a bands (NSCF-along-path) calculation only.

    '
  upstream_dependencies:
  - 06_scf
  downstream_stages: []
  required_qe_executables:
  - pw.x
  - bands.x
  expected_inputs:
  - name: bands.in
    description: bands calculation input with k-path definition
    required: true
  - name: bandspp.in
    description: bands.x post-processing input
    required: true
  expected_outputs:
  - name: bands.out
    description: bands calculation output
    required: true
  - name: bandspp.out
    description: bands.x post-processed output
    required: true
  - name: band_structure.dat
    description: Plottable band structure data
    required: true
  - name: band_structure.png
    description: Band structure plot with Fermi level reference
    required: false
  validation_rules:
  - name: kpath_completeness
    description: Verify k-path covers Γ-M-K-Γ for hexagonal, Γ-X-M-Γ for rectangular
  - name: nbands_sufficiency
    description: Check that nbnd covers at least E_F ± 10 eV
  - name: scf_charge_density_found
    description: Verify SCF charge density is accessible from bands outdir
  metadata:
    estimated_runtime: ~5–15 min on 28 cores
    parallelization: MPI over k-points along path
    produces_charge_density: false
- stage_name: Density of States
  stage_id: 08_dos
  stage_type: electronic_structure
  physics_question: What is the electronic density of states, including orbital projections
    (PDOS)?
  description: 'Calculate total DOS and atom/orbital-projected PDOS on a dense k-mesh.

    Requires an NSCF calculation on a fine k-grid (≥ 36×36×1 for 2D), followed by
    dos.x and projwfc.x post-processing.

    The NSCF step uses the SCF charge density from 06_scf.

    '
  upstream_dependencies:
  - 06_scf
  downstream_stages:
  - 09_charge
  - 10_workfunction
  - 11_bader
  required_qe_executables:
  - pw.x
  - dos.x
  - projwfc.x
  expected_inputs:
  - name: nscf.in
    description: NSCF input with dense k-mesh (≥ 36×36×1)
    required: true
  - name: dos.in
    description: dos.x input with energy window
    required: true
  - name: pdos.in
    description: projwfc.x input for orbital projection
    required: true
  expected_outputs:
  - name: nscf.out
    description: NSCF calculation output
    required: true
  - name: dos.out
    description: Total DOS data
    required: true
  - name: pdos.out
    description: Projected DOS per atom/orbital
    required: true
  - name: dos_plot.png
    description: Total DOS plot with Fermi reference
    required: false
  - name: pdos_plot.png
    description: Orbital-projected DOS plot
    required: false
  validation_rules:
  - name: kmesh_density
    description: NSCF k-mesh ≥ 36×36×1 for 2D DOS convergence
  - name: nbnd_sufficiency
    description: nbnd covers E_F ± 10 eV energy window
  - name: dos_normalization
    description: Integrated DOS matches expected electron count
  - name: fermi_alignment
    description: E_F = 0 in output data; verify against SCF Fermi energy
  metadata:
    estimated_runtime: ~20–40 min on 28 cores
    parallelization: MPI over dense k-mesh
    produces_charge_density: false
- stage_name: Charge Density Analysis
  stage_id: 09_charge
  stage_type: charge_analysis
  physics_question: What is the spatial distribution of electronic charge in the material?
  description: 'Analyze the real-space charge density distribution. Identify bonding
    character, charge transfer between species, and interlayer vs intralayer charge
    distribution for 2D materials.

    Purely post-processing on the SCF charge density from 06_scf. No new QE calculation.

    '
  upstream_dependencies:
  - 08_dos
  downstream_stages: []
  required_qe_executables:
  - pp.x
  expected_inputs:
  - name: charge_config.yaml
    description: Analysis configuration (planes, ranges, formats)
    required: true
  expected_outputs:
  - name: charge_density_2d.dat
    description: Planar-averaged charge density along z
    required: true
  - name: charge_difference_plot.png
    description: Charge density difference map
    required: false
  - name: charge_summary.yaml
    description: Charge transfer estimates, bonding character classification
    required: true
  validation_rules:
  - name: charge_conservation
    description: Integrated charge matches total electron count
  - name: vacuum_decay
    description: Charge density decays to ~0 in vacuum region
  metadata:
    estimated_runtime: < 1 min
    parallelization: Serial
    produces_charge_density: false
- stage_name: Work Function
  stage_id: 10_workfunction
  stage_type: charge_analysis
  physics_question: What is the electrostatic work function of the 2D material?
  description: 'Calculate the work function from the planar-averaged electrostatic
    potential along the vacuum direction. For 2D materials, this determines the energy
    required to extract an electron from the surface.

    Uses the SCF charge density from 06_scf. Purely post-processing.

    Note: Work function analysis is SEPARATE from charge density analysis (09_charge).
    They answer different physical questions and must not be merged.

    '
  upstream_dependencies:
  - 08_dos
  downstream_stages: []
  required_qe_executables:
  - pp.x
  expected_inputs:
  - name: wf_config.yaml
    description: Work function calculation parameters (axis, output format)
    required: true
  expected_outputs:
  - name: planar_potential.dat
    description: Planar-averaged electrostatic potential along vacuum axis
    required: true
  - name: work_function.yaml
    description: Calculated work function value (eV), vacuum level, Fermi level
    required: true
  validation_rules:
  - name: vacuum_plateau
    description: Potential plateaus in vacuum region — verify asymptotic behavior
  - name: dipole_correction
    description: For asymmetric 2D slabs, verify dipole correction applied or assess
      error
  - name: reference_consistency
    description: Fermi energy consistent with 06_scf output
  metadata:
    estimated_runtime: < 1 min
    parallelization: Serial
    produces_charge_density: false
- stage_name: Bader Charge Analysis
  stage_id: 11_bader
  stage_type: charge_analysis
  physics_question: What is the Bader (QTAIM) charge partitioning for each atom?
  description: 'Perform Bader charge analysis on the SCF charge density from 06_scf.
    Determines charge transfer between atomic species, oxidation states, and ionicity/covalency
    character.

    Requires external Bader analysis tool (Henkelman group). This is NOT a QE-native
    analysis but is essential for chemical understanding.

    Bader analysis is SEPARATE from charge density visualization (09_charge). Bader
    answers "how many electrons on each atom?" while 09_charge answers "where is the
    charge distributed in space?"

    '
  upstream_dependencies:
  - 08_dos
  downstream_stages: []
  required_qe_executables:
  - pp.x
  external_tools:
  - bader
  expected_inputs:
  - name: bader_config.yaml
    description: Bader analysis parameters
    required: true
  expected_outputs:
  - name: ACF.dat
    description: Bader atomic charge file
    required: true
  - name: BCF.dat
    description: Bader bond critical point file
    required: true
  - name: bader_summary.yaml
    description: Per-atom charges, total charge transfer, oxidation state assignments
    required: true
  validation_rules:
  - name: charge_conservation
    description: Sum of Bader charges ≈ total electron count
  - name: oxidation_state_reasonableness
    description: Assigned oxidation states match expected chemistry
  - name: grid_sufficiency
    description: Charge density grid fine enough for Bader integration
  metadata:
    estimated_runtime: ~1–5 min
    parallelization: Serial (bader) + MPI (pp.x)
    produces_charge_density: false
- stage_name: Phonon Stability
  stage_id: 12_ph_stability
  stage_type: vibrational
  physics_question: Is the 2D material dynamically stable (no imaginary phonon frequencies)?
  description: 'Calculate the phonon dispersion on a coarse q-mesh to verify dynamical
    stability. The presence of imaginary (negative) phonon frequencies indicates structural
    instability or an incorrect ground state.

    CRITICAL BOUNDARY: This stage answers ONLY the stability question. It does NOT
    calculate electron-phonon coupling. PH_STABILITY ≠ PH_EPC. These are STAGE-SEPARATED
    by design.

    Uses a coarse q-mesh (e.g., 4×4×1 or 6×6×1) sufficient for stability assessment
    without the computational cost of EPC-grade resolution.

    '
  upstream_dependencies:
  - 06_scf
  downstream_stages:
  - 13_q2r_matdyn
  required_qe_executables:
  - ph.x
  expected_inputs:
  - name: ph_stability.in
    description: ph.x input for phonon dispersion on coarse q-mesh
    required: true
  expected_outputs:
  - name: ph_stability.out
    description: ph.x output
    required: true
  - name: dynmat_files/
    description: Dynamical matrices on q-grid
    required: true
  - name: phonon_dispersion.dat
    description: Phonon frequencies along high-symmetry path
    required: true
  - name: stability_verdict.yaml
    description: Stable/Unstable verdict, max imaginary frequency, soft mode locations
    required: true
  validation_rules:
  - name: no_imaginary_frequencies
    description: All phonon frequencies ω² ≥ 0 at all q-points (within numerical noise
      ~1 cm⁻¹)
  - name: acoustic_sum_rule
    description: Three acoustic modes at Γ have ω = 0
  - name: qmesh_symmetry
    description: q-mesh respects crystal symmetry
  - name: asr_applied
    description: Acoustic sum rule correction applied (asr='simple' or 'crystal')
  metadata:
    estimated_runtime: ~1–4 hr on 28 cores (coarse q-mesh)
    parallelization: MPI over q-points (image parallelization)
    produces_charge_density: false
- stage_name: Interatomic Force Constants
  stage_id: 13_q2r_matdyn
  stage_type: vibrational
  physics_question: What are the real-space interatomic force constants (IFCs) from
    the dynamical matrices?
  description: 'Fourier-transform dynamical matrices from reciprocal space (q-grid)
    to real space using q2r.x, then interpolate phonon frequencies to arbitrary q-points
    using matdyn.x.

    This is a PURELY MATHEMATICAL post-processing stage. No new physics calculation.
    It converts the ph.x output into a form usable for: - Fine phonon dispersion plots
    - Phonon density of states - Electron-phonon coupling (14_epc)

    IMPORTANT: q2r.x must NOT attempt to compute la2F. la2F is EPC territory (14_epc).
    The validator must reject any q2r input containing la2F = .true.

    '
  upstream_dependencies:
  - 12_ph_stability
  downstream_stages:
  - 14_epc
  required_qe_executables:
  - q2r.x
  - matdyn.x
  expected_inputs:
  - name: q2r.in
    description: q2r.x input (NO la2F flag)
    required: true
  - name: matdyn.in
    description: matdyn.x input for phonon dispersion interpolation
    required: true
  expected_outputs:
  - name: q2r.out
    description: q2r.x output
    required: true
  - name: matdyn.out
    description: matdyn.x output with interpolated phonon frequencies
    required: true
  - name: force_constants.dat
    description: Real-space IFC file (.fc)
    required: true
  - name: phonon_dispersion_fine.dat
    description: Fully interpolated phonon dispersion
    required: true
  - name: phonon_dos.dat
    description: Phonon density of states (if requested)
    required: false
  validation_rules:
  - name: la2F_forbidden
    description: la2F must NOT be present in q2r.in — this is an EPC concern
  - name: fc_file_exists
    description: Force constant file (.fc) produced and non-empty
  - name: fourier_quality
    description: Interpolated phonons match original q-grid frequencies within tolerance
  - name: asr_preserved
    description: Acoustic sum rule preserved after Fourier transform
  metadata:
    estimated_runtime: < 1 min
    parallelization: Serial (q2r.x), Serial/OpenMP (matdyn.x)
    produces_charge_density: false
- stage_name: Electron-Phonon Coupling
  stage_id: 14_epc
  stage_type: superconductivity
  physics_question: What is the electron-phonon coupling strength (lambda) and the
    Eliashberg spectral function (a2F)?
  upstream_dependencies:
  - 06_scf
  downstream_dependencies:
  - 15_tc
  required_inputs:
  - ph_epc.in
  - matdyn_epc.in
  produced_outputs:
  - ph_epc.out
  - matdyn_epc.out
  - lambda.dat
  - a2F.dat
  - elph_dir/
  qe_programs:
  - ph.x
  - matdyn.x
  validation_targets:
  - electron_phonon_mode_valid
  - lambda_positive
  - a2F_positive
  - qmesh_finer_than_stability
  - sigma_metadata_present
  _readme: '# 14_epc — Electron-Phonon Coupling


    **Stage Type**: `superconductivity`


    ---


    ## 1. Physics Question


    What is the electron-phonon coupling strength (lambda) and the Eliashberg spectral
    function (a2F)?


    ## 2. Upstream Dependencies


    06_scf (dedicated dense SCF for EPC, separate from stability SCF)


    ## 3. Downstream Dependencies


    15_tc


    ## 4. Required QE Programs


    ph.x, matdyn.x


    ## 5. Expected Outputs


    - `ph_epc.out`

    - `matdyn_epc.out`

    - `lambda.dat`

    - `a2F.dat`

    - `elph_dir/`


    ## 6. Success Criteria


    - [x] electron_phonon explicitly set with valid mode (simple, interpolated, lambda_tetra)

    - [x] Lambda > 0 and physically reasonable for material type

    - [x] a2F(omega) positive and integrates to lambda

    - [x] Dense q-mesh used (finer than stability q-mesh)

    - [x] el_ph_sigma convergence sweep recorded or defaults documented


    ## 7. Failure Criteria


    - [ ] electron_phonon missing or set to unsupported mode for QE version

    - [ ] Lambda <= 0 or a2F contains negative values

    - [ ] Same q-mesh as stability run (EPC requires denser sampling)

    - [ ] Missing el_ph_sigma / el_ph_nsigma metadata (convergence unverifiable)


    ## Description


    Fine q-mesh ph.x calculation WITH electron_phonon coupling enabled.


    CRITICAL BOUNDARY: EPC != PH_STABILITY. Different q-mesh, different purpose.


    matdyn.x with la2F=.true. interpolates el-ph coefficients.


    Produces lambda, a2F(omega), and el-ph coupling matrices.


    Dense k-grid SCF (separate from 06_scf) may be needed for EPC q-mesh.



    ## 2D Materials Considerations


    2D: q-mesh must have nq3=1. EPC in 2D materials may require even denser q-sampling
    than 3D due to reduced dimensionality. Monitor convergence of lambda with q-mesh
    density. The q->0 contribution to EPC diverges for optical modes — flag this.
    el_ph_sigma sweep: test 0.01-0.05 Ry for 2D metals.

    ## Validation Targets


    - `electron_phonon_mode_valid`

    - `lambda_positive`

    - `a2F_positive`

    - `qmesh_finer_than_stability`

    - `sigma_metadata_present`

    '
