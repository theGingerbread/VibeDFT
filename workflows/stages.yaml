  _readme: '# 19_optical — Optical Properties (Dielectric Function)


    **Stage Type**: `optical`


    ---


    ## 1. Physics Question


    What is the frequency-dependent dielectric function and optical absorption spectrum?


    ## 2. Upstream Dependencies


    06_scf


    ## 3. Downstream Dependencies


    None (terminal stage)


    ## 4. Required QE Programs


    pw.x, epsilon.x


    ## 5. Expected Outputs


    - `dielectric_function.dat`

    - `absorption_spectrum.dat`


    ## 6. Success Criteria


    - [x] Dielectric function satisfies Kramers-Kronig consistency

    - [x] Absorption onset consistent with electronic band gap

    - [x] k-mesh dense enough for converged optical spectra

    - [x] Sufficient empty bands (nbnd) for target energy range


    ## 7. Failure Criteria


    - [ ] Kramers-Kronig violation indicates numerical issues

    - [ ] Absorption below the band gap (unphysical for perfect crystal at T=0)

    - [ ] k-mesh too sparse for reliable optical matrix elements

    - [ ] nbnd insufficient for target photon energy range


    ## Description


    Independent-particle approximation (IPA) dielectric function from epsilon.x.


    Requires dense k-mesh and sufficient empty bands.


    Independent of phonon/EPC chain.


    For 2D: optical properties are strongly anisotropic (in-plane vs out-of-plane).



    ## 2D Materials Considerations


    2D: optical absorption is strongly layer-dependent. In-plane vs out-of-plane response
    differs dramatically. Excitonic effects (beyond IPA) may be important for 2D semiconductors
    but require BSE (beyond current QE scope).

    ## Validation Targets


    - `kramers_kronig_consistency`

    - `absorption_onset_vs_gap`

    - `kmesh_density_optical`

    - `nbnd_empty_states`

    '
