  _readme: '# 16_elastic — Elastic Constants


    **Stage Type**: `mechanical`


    ---


    ## 1. Physics Question


    What are the elastic constants, and does the 2D material satisfy mechanical stability
    (Born criteria)?


    ## 2. Upstream Dependencies


    05_final_relax


    ## 3. Downstream Dependencies


    None (terminal stage)


    ## 4. Required QE Programs


    pw.x


    ## 5. Expected Outputs


    - `elastic_constants.yaml`

    - `mechanical_stability_verdict.yaml`


    ## 6. Success Criteria


    - [x] All required elastic constants computed (C11, C12, C66 for hexagonal 2D)

    - [x] Born stability criteria satisfied for 2D: C11 > 0, C11 > |C12|, C66 > 0

    - [x] Stress-strain response linear in the elastic regime (small strains)


    ## 7. Failure Criteria


    - [ ] Born criteria violated — material is mechanically unstable

    - [ ] Nonlinear stress-strain response indicates anharmonic effects or phase transition

    - [ ] Insufficient strain points for reliable elastic constant extraction


    ## Description


    Calculate 2D elastic constants via energy-strain or stress-strain method.


    Independent of electronic/vibrational chains — uses only relaxed geometry.


    2D Born criteria: C11>0, C11>|C12|, C66>0 (different from 3D).



    ## 2D Materials Considerations


    2D-specific: elastic constants in N/m (not GPa). Convert by multiplying by vacuum
    thickness. Born criteria for 2D hexagonal: C11>0, C11>|C12|, C66>0. In-plane Young''s
    modulus Y_2D = (C11^2 - C12^2)/C11.

    ## Validation Targets


    - `born_stability_2d`

    - `elastic_linearity`

    - `strain_range_adequate`

