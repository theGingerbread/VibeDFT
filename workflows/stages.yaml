  _readme: '# 20_report — Final Physics Report


    **Stage Type**: `report`


    ---


    ## 1. Physics Question


    Synthesis: what is the overall physics verdict for this 2D material, based on
    ALL upstream evidence?


    ## 2. Upstream Dependencies


    00_structure, 01_pseudopotentials, 02_preconv, 03_relax, 04_conv, 05_final_relax,
    06_scf, 07_bands, 08_dos, 09_charge, 10_workfunction, 11_bader, 12_ph_stability,
    13_q2r_matdyn, 14_epc, 15_tc, 16_elastic, 17_aimd, 18_exfoliation, 19_optical


    ## 3. Downstream Dependencies


    None (terminal stage)


    ## 4. Required QE Programs


    None


    ## 5. Expected Outputs


    - `final_report.md`

    - `physics_verdict.yaml`

    - `report.html (optional)`


    ## 6. Success Criteria


    - [x] Every physics claim cites a specific stage/output as evidence source

    - [x] Score grading follows deterministic formula (blockers/errors/warnings/provenance)

    - [x] Missing stages flagged as ''not evaluated'' rather than silently omitted

    - [x] No unsupported claims, no generated text without evidence citation


    ## 7. Failure Criteria


    - [ ] Claims without evidence citation (agent hallucination risk)

    - [ ] Final score presented without component breakdown

    - [ ] Missing critical stage output but report claims ''complete''

    - [ ] Absolute paths, usernames, or hostnames exposed in report


    ## Description


    Aggregate ALL stage outputs into a structured physics report.


    Score ranges: 8-10 publishable, 6-8 adequate (needs convergence), 4-6 concerning,
    <4 unreliable.


    Scoring formula: start at 100, subtract: 30*blockers, 15*errors, 5*warnings, 20*missing_summaries,
    10*missing_provenance.


    Each section of the report corresponds to one or more workflow stages.


    The report is the TERMINAL output — it is consumed by the agent (via evidence
    pack only).



    ## 2D Materials Considerations


    2D-specific report sections: stability (phonon + mechanical), electronic structure,
    charge analysis, work function, exfoliation feasibility, superconductivity (if
    applicable). The dimensionality (2D) must be explicitly stated in the report header.

    ## Validation Targets


    - `all_stages_complete_or_flagged`

    - `evidence_citation_required`

    - `score_deterministic`

    - `no_unsupported_claims`

    - `privacy_redacted`

