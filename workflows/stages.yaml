  _readme: '# 15_tc — Superconducting Tc Estimation


    **Stage Type**: `superconductivity`


    ---


    ## 1. Physics Question


    What is the estimated superconducting transition temperature Tc, and under what
    approximations?


    ## 2. Upstream Dependencies


    14_epc


    ## 3. Downstream Dependencies


    None (terminal stage)


    ## 4. Required QE Programs


    lambda.x


    ## 5. Expected Outputs


    - `lambda_tc.out`

    - `tc_estimate.yaml`


    ## 6. Success Criteria


    - [x] Tc estimate includes explicit method declaration (McMillan or Allen-Dynes)

    - [x] mu* value explicitly stated and justified

    - [x] Two-grid overlap between dense EPC k/q grids verified

    - [x] Tc estimation caveats and applicability limits documented


    ## 7. Failure Criteria


    - [ ] Single-grid (preliminary) Tc presented as final without caveat

    - [ ] mu* not stated or unjustified (typical range 0.10-0.15)

    - [ ] No two-grid overlap verification — Tc may be unconverged

    - [ ] McMillan formula applied outside its validity range (lambda > 2.0)


    ## Description


    Estimate Tc from EPC lambda, omega_log, and a2F using McMillan or Allen-Dynes
    formula.


    lambda.x is a post-processing tool that reads EPC output.


    MUST declare if Tc is same-grid (preliminary) or multi-grid (converged).


    QE''s own documentation states lambda.x gives an ESTIMATE — always attach formula
    caveat.


    Note: Allen-Dynes is also an approximation; full Eliashberg or SCDFT is beyond
    QE scope.



    ## 2D Materials Considerations


    2D superconductivity: Tc in 2D materials may be affected by substrate interactions,
    doping, and strain that are not captured in the bare QE calculation. Always state
    these caveats. Ising superconductivity in 2D TMDs may enhance in-plane critical
    field beyond Pauli limit.

    ## Validation Targets


    - `two_grid_overlap_required`

    - `mu_star_explicit`

    - `method_declared`

    - `mcmillan_applicability`

    - `formula_warning_emitted`

    '
