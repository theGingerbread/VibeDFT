name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[plot,server,dev]"

      - name: Tests
        run: python -m pytest -q --tb=short

      - name: Reorg health checks
        run: python3 scripts/reorg_health_check.py --skip-cases

      - name: VibeDFT goal acceptance (skip case layout scan)
        run: PYTHONPATH=src python3 -m vibedft goal --skip-cases --json

  privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Privacy audit
        env:
          VIBEDFT_PRIVATE_TOKENS: hzw,bcgong,djwang,preston,maxwell
        run: |
          PYTHONPATH=src python3 -m vibedft.core.privacy_audit \
            --root . \
            --paths src tests/fixtures \
            --exclude tests/Templates
